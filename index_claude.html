<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대중소 네모로직</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap');

        :root {
            /* Light theme (default) */
            --bg-color: #f8fafc;
            --container-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-main: #0f172a;
            --border-grid-sub: #e2e8f0;
            --border-grid-bold: #64748b;
            --cell-bg: #ffffff;
            --cell-filled: #0f172a;
            --cell-marked: var(--cell-filled);
            --hint-completed: #cbd5e1;
            
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
            --btn-success: #10b981;
            --btn-success-hover: #059669;
            --btn-danger: #ef4444;
            --btn-danger-hover: #dc2626;
            --btn-disabled: #cbd5e1;
            --btn-disabled-text: #94a3b8;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            
            --modal-bg: rgba(0, 0, 0, 0.5);
            --modal-content-bg: #ffffff;
            --modal-blur: 8px;
            
            --transition-speed: 0.2s;
        }

        body.dark-theme {
            /* Dark theme */
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-main: #cbd5e1;
            --border-grid-sub: #334155;
            --border-grid-bold: #94a3b8;
            --cell-bg: #1e293b;
            --cell-filled: #cbd5e1;
            --cell-marked: var(--cell-filled);
            --hint-completed: #94a3b8;
            
            --btn-bg: #2563eb;
            --btn-hover: #1d4ed8;
            --btn-success: #059669;
            --btn-success-hover: #047857;
            --btn-danger: #dc2626;
            --btn-danger-hover: #b91c1c;
            --btn-disabled: #334155;
            --btn-disabled-text: #64748b;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.5);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3), 0 4px 6px -4px rgb(0 0 0 / 0.3);
            
            --modal-bg: rgba(0, 0, 0, 0.7);
            --modal-content-bg: #1e293b;
        }

        body {
            font-family: 'Inter', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            touch-action: manipulation;
        }
        
        .header-container {
            display: flex;
            width: 100%;
            max-width: 600px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .theme-btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            background-color: var(--container-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-grid-sub);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-speed);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-btn:hover {
            background-color: var(--border-grid-sub);
            transform: translateY(-1px);
        }

        .setup-controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: var(--container-bg);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            transition: background-color var(--transition-speed);
        }
        
        .setup-label {
            font-weight: bold;
            font-size: 14px;
            color: var(--text-secondary);
        }

        select {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid var(--border-grid-sub);
            background-color: var(--cell-bg);
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
            transition: all var(--transition-speed);
        }
        
        select:focus {
            border-color: var(--btn-bg);
        }

        .game-container {
            display: inline-grid; /* 컨텐츠에 딱 맞게 */
            grid-template-columns: min-content auto;
            grid-template-rows: min-content auto;
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            transition: background-color var(--transition-speed), box-shadow var(--transition-speed);
        }
        .empty { 
            grid-column: 1; 
            grid-row: 1; 
        }
        .col-hints {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            border-bottom: 2px solid var(--border-main);
            transition: border-color var(--transition-speed);
        }
        .hint-col {
            width: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            font-size: 11px;
            padding-bottom: 3px;
            border-left: 1px solid var(--border-grid-sub);
            box-sizing: border-box;
            color: var(--text-secondary);
            transition: all var(--transition-speed);
        }
        .row-hints {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border-main);
            transition: border-color var(--transition-speed);
        }
        .hint-row {
            height: 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 11px;
            padding-right: 5px;
            border-top: 1px solid var(--border-grid-sub);
            box-sizing: border-box;
            white-space: nowrap; /* 숫자가 줄바꿈되지 않게 */
            color: var(--text-secondary);
            transition: all var(--transition-speed);
        }
        .grid {
            grid-column: 2;
            grid-row: 2;
            display: grid;
            border-right: 2px solid var(--border-main);
            border-bottom: 2px solid var(--border-main);
            transition: border-color var(--transition-speed);
        }
        .cell {
            width: 30px;
            height: 30px;
            border-right: 1px solid var(--border-grid-sub);
            border-bottom: 1px solid var(--border-grid-sub);
            background-color: var(--cell-bg);
            cursor: pointer;
            box-sizing: border-box;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }
        /* 첫 줄/첫 열 보더 처리 */
        .cell:nth-child(n) { border-left: none; border-top: none; }
        
        /* 5칸마다 강조선 */
        .v-bold { border-right: 2px solid var(--border-grid-bold) !important; }
        .h-bold { border-bottom: 2px solid var(--border-grid-bold) !important; }

        .cell.filled {
            background-color: var(--cell-filled);
        }
        .cell.marked {
            position: relative;
        }
        .cell.marked::after {
            content: "X";
            color: var(--cell-marked);
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            background-color: var(--container-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border-grid-sub);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }
        button:hover:not(:disabled) {
            background-color: var(--border-grid-sub);
            color: var(--text-primary);
        }
        button:disabled {
            background-color: var(--btn-disabled);
            color: var(--btn-disabled-text);
            cursor: not-allowed;
            border-color: transparent;
            box-shadow: none;
        }
        
        .primary-btn {
            background-color: var(--btn-bg);
            color: white;
            border: none;
        }
        .primary-btn:hover:not(:disabled) {
            background-color: var(--btn-hover);
            color: white;
        }
        
        button.tool-btn {
            font-weight: bold;
            color: white;
            border: none;
        }
        button.tool-btn.fill-mode {
            background-color: var(--btn-success); /* Green for check */
        }
        button.tool-btn.fill-mode:hover:not(:disabled) {
            background-color: var(--btn-success-hover);
        }
        button.tool-btn.mark-mode {
            background-color: var(--btn-danger); /* Red for X */
        }
        button.tool-btn.mark-mode:hover:not(:disabled) {
            background-color: var(--btn-danger-hover);
        }
        #message {
            margin-top: 15px;
            font-weight: bold;
            height: 24px;
            text-align: center;
        }

        /* 모달 배경 (Glassmorphism & Fade transition) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-bg);
            backdrop-filter: blur(var(--modal-blur));
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            opacity: 1;
        }

        /* 모달 콘텐츠 박스 */
        .modal-content {
            background-color: var(--modal-content-bg);
            color: var(--text-primary);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            position: relative;
            max-width: 400px;
            width: 90%;
            transform: scale(0.7);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        /* 닫기 버튼 */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        /* 빵빠레 이미지 */
        .victory-img {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }

        .modal-content h2 {
            color: var(--btn-success);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .modal-content p {
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-size: 16px;
        }

        .modal-btn {
            background-color: var(--btn-success);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: bold;
        }

        .modal-btn:hover {
            background-color: var(--btn-success-hover);
            transform: translateY(-2px);
        }

        .modal-btn:active {
            transform: translateY(0);
        }

        .hint-row span, .hint-col span {
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 2px solid transparent;
            border-radius: 50%;
        }
        .hint-row span {
            width: 12px;
            height: 12px;
            font-size: 11.5px;
            margin-left: -1px;
        }
        .hint-col span {
            width: 12px;
            height: 12px;
            font-size: 11.5px;
            margin-top: 2px;
        }
        .hint-completed {
            color: var(--hint-completed) !important;
            opacity: 0.7;
        }

        /* 모바일 화면 최적화 */
        @media (max-width: 600px) {
            body {
                padding: 10px 5px;
            }
            .header-container {
                max-width: 95%;
            }
            .game-container {
                padding: 8px;
                border-radius: 8px;
            }
            .setup-controls {
                flex-wrap: wrap;
                justify-content: center;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>대중소 네모로직</h1>
        <div style="display: flex; gap: 12px; align-items: center;">
            <span id="clearCountDisplay" style="font-size: 14px; font-weight: 600; color: var(--text-secondary);">🏆 완료: 0회</span>
            <button id="themeToggleBtn" onclick="toggleTheme()" class="theme-btn">🌙 다크 모드</button>
        </div>
    </div>
    
    <div class="setup-controls">
        <label for="sizeSelect" class="setup-label">크기:</label>
        <select id="sizeSelect" style="margin-right: 10px;">
            <option value="5">5 x 5</option>
            <option value="10" selected>10 x 10</option>
            <option value="15">15 x 15</option>
        </select>
        <label for="diffSelect" class="setup-label">난이도:</label>
        <select id="diffSelect" style="margin-right: 10px;">
            <option value="easy">😊 쉬움</option>
            <option value="normal" selected>🤔 보통</option>
            <option value="hard">🔥 어려움</option>
        </select>
        <button onclick="startNewGame()" class="primary-btn">새 게임 만들기</button>
    </div>

    <!-- 상단 상시 고정 모드 표시 카드 (기존 크기와 디자인 유지) -->
    <div id="modeDisplay" style="margin-bottom: 20px; font-size: 14px; text-align: center; padding: 10px 15px; border-radius: 8px; background-color: var(--container-bg); border: 1px solid var(--border-grid-sub); width: 100%; max-width: 480px; box-sizing: border-box; font-weight: 500; line-height: 1.5; transition: color var(--transition-speed);"></div>

    <div class="game-container">
        <div class="empty"></div>
        <div id="colHints" class="col-hints"></div>
        <div id="rowHints" class="row-hints"></div>
        <div id="grid" class="grid"></div>
    </div>
    
    <div class="controls">
        <button id="toolToggleBtn" onclick="toggleTool()" class="tool-btn fill-mode">모드: 체크 ⬛</button>
        <button id="undoBtn" onclick="undo()" disabled>되돌리기</button>
        <button id="redoBtn" onclick="redo()" disabled>다시 실행</button>
        <button onclick="resetCurrentGame()">다시 칠하기</button>
    </div>
    <p id="message" style="min-height: 20px; font-weight: bold; margin-top: 10px;"></p>

    <!-- 승리 모달 팝업 -->
    <div id="victoryModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img src="fanfare.png" alt="축하합니다" class="victory-img">
            <h2>🎉 축하합니다! 🎉</h2>
            <p>네모로직 퍼즐을 성공적으로 해결하셨습니다!</p>
            <p id="modalClearCount" style="font-weight: 600; color: var(--btn-success); margin-top: -10px; margin-bottom: 20px;">누적 완료 횟수: 0회</p>
            <button class="modal-btn" onclick="startNewGameFromModal()">새 게임 시작하기</button>
        </div>
    </div>

    <script>
        let size = 10;
        let solution = [];
        let userGrid = [];
        let isDragging = false;
        let dragMode = null; // 'fill', 'unfill', 'mark', 'unmark'
        let dragAxis = null; // 'row', 'col'
        let startR = null;
        let startC = null;
        let undoStack = [];
        let redoStack = [];
        let currentTool = 'fill'; // 'fill' or 'mark'
        let clearCount = parseInt(localStorage.getItem('nemologic_clear_count') || '0');
        let isGameFinished = false;

        function updateClearCountUI() {
            const display = document.getElementById('clearCountDisplay');
            if (display) {
                display.textContent = `🏆 완료: ${clearCount}회`;
            }
            const modalDisplay = document.getElementById('modalClearCount');
            if (modalDisplay) {
                modalDisplay.textContent = `누적 완료 횟수: ${clearCount}회`;
            }
        }

        function toggleTool() {
            const btn = document.getElementById('toolToggleBtn');
            if (currentTool === 'fill') {
                currentTool = 'mark';
                btn.textContent = '모드: X ❌';
                btn.className = 'tool-btn mark-mode';
            } else {
                currentTool = 'fill';
                btn.textContent = '모드: 체크 ⬛';
                btn.className = 'tool-btn fill-mode';
            }
        }

        // --- 100% 논리적 풀이 검증기 (1번 모드용 Solver) ---
        function getValidConfigurations(length, hints, currentLine) {
            const configs = [];
            let configCount = 0;
            const maxConfigs = length === 15 ? 10000 : (length === 10 ? 3000 : 1200);

            function dfs(hintIdx, linePos, currentConfig) {
                if (configCount > maxConfigs) return;
                if (hintIdx === hints.length) {
                    for (let i = linePos; i < length; i++) {
                        if (currentLine[i] === 1) return;
                        currentConfig[i] = 2;
                    }
                    configs.push([...currentConfig]);
                    configCount++;
                    return;
                }

                const currentHint = hints[hintIdx];
                let minSpaceRequired = currentHint;
                for (let k = hintIdx + 1; k < hints.length; k++) {
                    minSpaceRequired += 1 + hints[k];
                }

                const maxStartPos = length - minSpaceRequired;
                for (let start = linePos; start <= maxStartPos; start++) {
                    if (start > linePos && currentLine[start - 1] === 1) break;

                    let possible = true;
                    for (let i = start; i < start + currentHint; i++) {
                        if (currentLine[i] === 2) { possible = false; break; }
                    }

                    if (possible && start + currentHint < length && currentLine[start + currentHint] === 1) {
                        possible = false;
                    }

                    if (possible) {
                        const nextConfig = [...currentConfig];
                        for (let i = linePos; i < start; i++) nextConfig[i] = 2;
                        for (let i = start; i < start + currentHint; i++) nextConfig[i] = 1;
                        let nextPos = start + currentHint;
                        if (nextPos < length) { nextConfig[nextPos] = 2; nextPos++; }
                        dfs(hintIdx + 1, nextPos, nextConfig);
                    }

                    if (currentLine[start] === 1) break;
                }
            }

            dfs(0, 0, Array(length).fill(0));
            return configCount > maxConfigs ? null : configs;
        }

        function solveLine(length, hints, currentLine) {
            if (hints.length === 1 && hints[0] === 0) return Array(length).fill(2);
            
            const configs = getValidConfigurations(length, hints, currentLine);
            if (!configs || configs.length === 0) return null;

            const result = Array(length).fill(0);
            for (let i = 0; i < length; i++) {
                let allOne = true;
                let allTwo = true;
                for (let j = 0; j < configs.length; j++) {
                    if (configs[j][i] !== 1) allOne = false;
                    if (configs[j][i] !== 2) allTwo = false;
                }
                if (allOne) result[i] = 1;
                else if (allTwo) result[i] = 2;
            }
            return result;
        }


        // ═══ 난이도 측정: 라인솔버 패스 수 = 사람이 오가야 하는 횟수 ═══
        function solveMeta(size, solution){
            const rowHints = solution.map(row => getHints(row));
            const colHints = Array(size).fill().map((_, c) => getHints(solution.map(row => row[c])));
            const board = Array(size).fill().map(() => Array(size).fill(0));
            let changed = true, passes = 0;
            const maxIterations = size * 3;
            const progress = [];                      // ⭐패스별 신규 확정 셀 수(풀이 리듬 곡선)
            while (changed && passes < maxIterations) {
                changed = false; passes++;
                let gained = 0;
                for (let r = 0; r < size; r++) {
                    const solved = solveLine(size, rowHints[r], board[r]);
                    if (!solved) return {solvable:false, passes, progress};
                    for (let c = 0; c < size; c++) if (board[r][c] === 0 && solved[c] !== 0){ board[r][c] = solved[c]; changed = true; gained++; }
                }
                for (let c = 0; c < size; c++) {
                    const cur = board.map(row => row[c]);
                    const solved = solveLine(size, colHints[c], cur);
                    if (!solved) return {solvable:false, passes, progress};
                    for (let r = 0; r < size; r++) if (board[r][c] === 0 && solved[r] !== 0){ board[r][c] = solved[r]; changed = true; gained++; }
                }
                if (gained > 0) progress.push(gained);
            }
            const done = board.flat().every(v => v !== 0);
            return {solvable: done, passes, progress};
        }

        // ═══ ⭐풀이 재미 점수(2026-07-03): '도미노 체인' 리듬을 수치화 ═══
        //  ①첫 패스 확정률 15~35% = 실마리는 있지만 시시하지 않음
        //  ②패스마다 고르게 풀림(진행 곡선 평탄) = 막힘·급붕괴 없이 아하-아하-아하
        //  ③마지막 패스 몫이 너무 크면(>40%) 감점 = 후반 노가다 방지
        function funScore(size, meta){
            const total = size * size;
            const pr = meta.progress;
            if (!meta.solvable || pr.length < 2) return -1e9;
            const first = pr[0] / total;
            let score = 0;
            score -= Math.abs(first - 0.25) * 40;                        // 첫 패스 스위트스팟(25%)
            const mean = pr.reduce((a,b)=>a+b,0)/pr.length;
            const cv = Math.sqrt(pr.reduce((a,b)=>a+(b-mean)*(b-mean),0)/pr.length) / mean;
            score -= cv * 10;                                            // 리듬 평탄성(변동계수)
            const last = pr[pr.length-1] / total;
            if (last > 0.4) score -= (last - 0.4) * 30;                  // 막판 우르르 감점
            score += Math.min(pr.length, 8);                             // 체인 길이 보너스
            return score;
        }

        // 난이도 밴드(패스 수 기준): 스파이더와 같은 '밴드 샘플링' 철학 — 극과극 없이 일관된 손맛
        function diffBand(size){
            const d = (document.getElementById('diffSelect')||{}).value || 'normal';
            if (size === 5)  return d==='easy'?[1,2]:d==='normal'?[3,4]:[5,99];
            if (size === 10) return d==='easy'?[1,4]:d==='normal'?[5,8]:[9,99];
            return d==='easy'?[1,5]:d==='normal'?[6,10]:[11,99];
        }

        function isLogicallySolvable(size, solution) {
            const rowHints = solution.map(row => getHints(row));
            const colHints = Array(size).fill().map((_, c) => getHints(solution.map(row => row[c])));
            const board = Array(size).fill().map(() => Array(size).fill(0));

            let changed = true;
            let iterations = 0;
            const maxIterations = size * 3;

            while (changed && iterations < maxIterations) {
                changed = false;
                iterations++;

                for (let r = 0; r < size; r++) {
                    const solved = solveLine(size, rowHints[r], board[r]);
                    if (!solved) return false;
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] === 0 && solved[c] !== 0) {
                            board[r][c] = solved[c];
                            changed = true;
                        }
                    }
                }

                for (let c = 0; c < size; c++) {
                    const currentLine = board.map(row => row[c]);
                    const solved = solveLine(size, colHints[c], currentLine);
                    if (!solved) return false;
                    for (let r = 0; r < size; r++) {
                        if (board[r][c] === 0 && solved[r] !== 0) {
                            board[r][c] = solved[r];
                            changed = true;
                        }
                    }
                }
            }

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            return true;
        }

        // --- 무작위 퍼즐 멀티 모드 상태 변수 ---
        let activeGenerationMode = 0; 
        let activeModeName = "";
        let activeModeDesc = "";

        // --- 100% 풀이 보장 백업용 동적 무작위 생성 대체 함수 ---
        function fallbackToBasicSolvable() {
            let solvable = false;
            while (!solvable) {
                solution = Array(size).fill().map(() => 
                    Array(size).fill().map(() => Math.random() > 0.5 ? 1 : 0)
                );
                solvable = isLogicallySolvable(size, solution);
            }
        }

        // --- 스타터 힌트 교차점 간섭 보정 함수 ---
        function applyStarterHints() {
            let minLen = 3, maxLen = 4;
            if (size === 10) { minLen = 7; maxLen = 8; }
            else if (size === 15) { minLen = 10; maxLen = 12; }
            
            const len = Math.floor(Math.random() * (maxLen - minLen + 1)) + minLen;
            const isRow = Math.random() < 0.5;

            if (isRow) {
                const targetRow = Math.floor(Math.random() * size);
                const startPos = Math.floor(Math.random() * (size - len + 1));
                for (let c = 0; c < size; c++) {
                    solution[targetRow][c] = (c >= startPos && c < startPos + len) ? 1 : 0;
                }
            } else {
                const targetCol = Math.floor(Math.random() * size);
                const startPos = Math.floor(Math.random() * (size - len + 1));
                for (let r = 0; r < size; r++) {
                    solution[r][targetCol] = (r >= startPos && r < startPos + len) ? 1 : 0;
                }
            }
        }

        function getQualityConfig(attempts, size) {
            if (attempts > 120) {
                // Level 4: basic solvability only
                return { minDensity: 0.25, maxDensity: 0.70, maxHintLimit: size, starterHintThreshold: 1, maxSegmentsLimit: size, minIterations: 1 };
            } else if (attempts > 80) {
                // Level 3: allow slightly simpler and more segmented
                return { minDensity: 0.33, maxDensity: 0.60, maxHintLimit: size === 10 ? 8 : 13, starterHintThreshold: size === 10 ? 5 : 8, maxSegmentsLimit: size === 10 ? 4 : 5, minIterations: 2 };
            } else if (attempts > 40) {
                // Level 2: density and iterations slightly relaxed
                return { minDensity: 0.35, maxDensity: 0.55, maxHintLimit: size === 10 ? 7 : 11, starterHintThreshold: size === 10 ? 6 : 9, maxSegmentsLimit: size === 10 ? 3 : 4, minIterations: 2 };
            } else {
                // Level 1: strict high quality
                return { minDensity: 0.38, maxDensity: 0.52, maxHintLimit: size === 10 ? 7 : 11, starterHintThreshold: size === 10 ? 6 : 9, maxSegmentsLimit: size === 10 ? 3 : 4, minIterations: 3 };
            }
        }

        function evaluatePuzzleQuality(size, solution, config = {}) {
            const rowHints = solution.map(row => getHints(row));
            const colHints = Array(size).fill().map((_, c) => getHints(solution.map(row => row[c])));
            
            // 1. Density Check (default: 38% ~ 52%)
            const filledCount = solution.flat().filter(v => v === 1).length;
            const density = filledCount / (size * size);
            let minDensity = config.minDensity !== undefined ? config.minDensity : 0.38;
            let maxDensity = config.maxDensity !== undefined ? config.maxDensity : 0.52;
            if (density < minDensity || density > maxDensity) return { ok: false, reason: "density" };

            // 2. Clue Constraints
            let maxHintLimit = config.maxHintLimit || (size === 10 ? 7 : (size === 15 ? 11 : 4));
            let starterHintThreshold = config.starterHintThreshold || (size === 10 ? 6 : (size === 15 ? 9 : 3));
            let maxSegmentsLimit = config.maxSegmentsLimit || (size === 10 ? 3 : (size === 15 ? 4 : 2));
            
            let hasStarterHint = false;
            
            // Check row hints
            for (let r = 0; r < size; r++) {
                const hints = rowHints[r];
                if (hints.length > maxSegmentsLimit) return { ok: false, reason: "fragmentation" };
                for (let h of hints) {
                    if (h > maxHintLimit) return { ok: false, reason: "too_easy" };
                    if (h >= starterHintThreshold) hasStarterHint = true;
                }
            }
            
            // Check col hints
            for (let c = 0; c < size; c++) {
                const hints = colHints[c];
                if (hints.length > maxSegmentsLimit) return { ok: false, reason: "fragmentation" };
                for (let h of hints) {
                    if (h > maxHintLimit) return { ok: false, reason: "too_easy" };
                    if (h >= starterHintThreshold) hasStarterHint = true;
                }
            }
            
            if (!hasStarterHint) return { ok: false, reason: "no_starter" };

            // 3. Solve & Iteration count check (Cascade Depth)
            const board = Array(size).fill().map(() => Array(size).fill(0));
            let changed = true;
            let iterations = 0;
            const maxIterations = size * 3;

            while (changed && iterations < maxIterations) {
                changed = false;
                iterations++;

                for (let r = 0; r < size; r++) {
                    const solved = solveLine(size, rowHints[r], board[r]);
                    if (!solved) return { ok: false, reason: "unsolvable" };
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] === 0 && solved[c] !== 0) {
                            board[r][c] = solved[c];
                            changed = true;
                        }
                    }
                }

                for (let c = 0; c < size; c++) {
                    const currentLine = board.map(row => row[c]);
                    const solved = solveLine(size, colHints[c], currentLine);
                    if (!solved) return { ok: false, reason: "unsolvable" };
                    for (let r = 0; r < size; r++) {
                        if (board[r][c] === 0 && solved[r] !== 0) {
                            board[r][c] = solved[r];
                            changed = true;
                        }
                    }
                }
            }

            // Check if fully solved
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) return { ok: false, reason: "incomplete" };
                }
            }

            // Iterations check: cascade depth
            let minIterations = config.minIterations !== undefined ? config.minIterations : 3;
            if (iterations < minIterations) return { ok: false, reason: "too_simple" };

            return { ok: true, iterations: iterations };
        }

        function generateRandomSolution() {
            const band = diffBand(size);
            // ⭐절차 생성: 표본 여러 판 중 '난이도 밴드 안에서 풀이 재미(funScore) 최고' 채택
            let bestIn = null, bestInScore = -1e9;     // 밴드 안 최고 재미
            let bestNear = null, bestNearGap = 1e9;    // 밴드 근접 폴백
            const TRIES = size === 15 ? 24 : 40;
            for (let bandTry = 0; bandTry < TRIES; bandTry++) {
                _genOnce();
                const m = solveMeta(size, solution);
                if (!m.solvable) continue;
                if (m.passes >= band[0] && m.passes <= band[1]) {
                    const f = funScore(size, m);
                    if (f > bestInScore) { bestInScore = f; bestIn = solution.map(r=>r.slice()); }
                } else {
                    const gap = m.passes < band[0] ? band[0]-m.passes : m.passes-band[1];
                    if (gap < bestNearGap) { bestNearGap = gap; bestNear = solution.map(r=>r.slice()); }
                }
            }
            if (bestIn) solution = bestIn;
            else if (bestNear) solution = bestNear;
        }

        function _genOnce() {

                while (!solvable && attempts < 150) {

                    solution = Array(size).fill().map(() => Array(size).fill(0));
                    for (let r = 0; r < size; r++) {
                        for (let c = 0; c < size; c++) {
                            let left = c > 0 ? solution[r][c - 1] : 0;
                            let top = r > 0 ? solution[r - 1][c] : 0;
                            let prob = 0.28;
                            if (left === 1 || top === 1) {
                                prob = 0.62;
                            }
                            solution[r][c] = Math.random() < prob ? 1 : 0;
                        }
                    }

                    // 외톨이 점(1x1) 감지 및 주변 병합/제거
                    for (let r = 0; r < size; r++) {

                            if (solution[r][c] === 1) {
                                const left = c > 0 ? solution[r][c - 1] : 0;
                                const right = c < size - 1 ? solution[r][c + 1] : 0;

                let solvable = false;

                                    const nr = r + dr;
                                    const nc = c + dc;
                                    if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                                        if (solution[nr][nc] === 1) neighbors++;
                                    }
                                }
                            }
                            // 이웃이 있으면 더 높은 확률로 채워지게 하여 뭉치게 만듦 (싱글톤 방지)
                            let prob = neighbors >= 1 ? 0.60 : 0.28; 
                            solution[r][c] = Math.random() < prob ? 1 : 0;
                        }
                    }
                    
                    // 2단계: 싱글톤 픽셀 감지 및 주변 병합/제거
                    for (let r = 0; r < size; r++) {
                        for (let c = 0; c < size; c++) {
                            if (solution[r][c] === 1) {
                                const left = c > 0 ? solution[r][c - 1] : 0;
                                const right = c < size - 1 ? solution[r][c + 1] : 0;
                                if (left === 0 && right === 0) {
                                    if (Math.random() < 0.6) {

            else if (activeGenerationMode === 4) {

                let solvable = false;
                let attempts = 0;
                while (!solvable && attempts < 150) {
                    attempts++;
                    
                    // 1단계: 주변 이웃을 고려해 싱글톤(1칸 점)이 적은 기본 맵 생성 (연속성 상향)
                    solution = Array(size).fill().map(() => Array(size).fill(0));

                                    const nr = r + dr;

                                    if (nr >= 0 && nr < size && nc >= 0 && nc < size) {

                    for (let r = 0; r < size; r++) {

                                solution[r][size - 1 - c] = val;
                            }
                        }
                    } else if (symType === 1) {
                        const halfRows = Math.ceil(size / 2);
                        for (let r = 0; r < halfRows; r++) {
                            for (let c = 0; c < size; c++) {
                                const val = Math.random() < density ? 1 : 0;
                                solution[r][c] = val;
                                solution[size - 1 - r][c] = val;
                            }
                        }
                    } else {
                        const halfRows = Math.ceil(size / 2);
                        const halfCols = Math.ceil(size / 2);
                        for (let r = 0; r < halfRows; r++) {
                            for (let c = 0; c < halfCols; c++) {
                                const val = Math.random() < density ? 1 : 0;
                                solution[r][c] = val;
                                solution[r][size - 1 - c] = val;
                                solution[size - 1 - r][c] = val;
                                solution[size - 1 - r][size - 1 - c] = val;
                            }
                        }
                    }
                    
                    solvable = isLogicallySolvable(size, solution);
                }
                
                if (!solvable) {
                    fallbackToBasicSolvable();
                }
            }
            
            // 빈 판 방지 예외 처리
            if (solution.flat().every(v => v === 0)) {
                solution[Math.floor(Math.random()*size)][Math.floor(Math.random()*size)] = 1;
            }
        }

        function initGameUI(isRestore = false) {
            if (!isRestore) {
                userGrid = Array(size).fill().map(() => Array(size).fill(0));
            }
            
            const grid = document.getElementById('grid');
            const rowHints = document.getElementById('rowHints');
            const colHints = document.getElementById('colHints');

            grid.innerHTML = '';
            rowHints.innerHTML = '';
            colHints.innerHTML = '';

            grid.style.gridTemplateColumns = `repeat(${size}, 30px)`;
            grid.style.gridTemplateRows = `repeat(${size}, 30px)`;

            for (let r = 0; r < size; r++) {
                const hints = getHints(solution[r]);
                const div = document.createElement('div');
                div.className = 'hint-row';
                div.dataset.r = r;
                if ((r + 1) % 5 === 0 && (r + 1) !== size) div.classList.add('h-bold');
                hints.forEach((h, index) => {
                    const span = document.createElement('span');
                    span.textContent = h;
                    span.dataset.index = index;
                    div.appendChild(span);
                });
                rowHints.appendChild(div);
            }

            for (let c = 0; c < size; c++) {
                const colArr = solution.map(row => row[c]);
                const hints = getHints(colArr);
                const div = document.createElement('div');
                div.className = 'hint-col';
                div.dataset.c = c;
                if ((c + 1) % 5 === 0 && (c + 1) !== size) div.classList.add('v-bold');
                hints.forEach((h, index) => {
                    const span = document.createElement('span');
                    span.textContent = h;
                    span.dataset.index = index;
                    div.appendChild(span);
                });
                colHints.appendChild(div);
            }

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if ((c + 1) % 5 === 0 && (c + 1) !== size) cell.classList.add('v-bold');
                    if ((r + 1) % 5 === 0 && (r + 1) !== size) cell.classList.add('h-bold');
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    
                    let lastDragEndTime = 0;

                    cell.onmousedown = (e) => {
                        if (e.button !== 0 && e.button !== 2) return;
                        e.preventDefault();
                        if (isDragging || Date.now() - lastDragEndTime < 50) return;
                        isDragging = true;
                        startR = r;
                        startC = c;
                        dragAxis = null; // 축 초기화
                        
                        saveState();

                        if (e.button === 0) { // 왼쪽 클릭 / 터치
                            if (currentTool === 'fill') {
                                dragMode = cell.classList.contains('filled') ? 'unfill' : 'fill';
                            } else {
                                dragMode = cell.classList.contains('marked') ? 'unmark' : 'mark';
                            }
                            handleAction(r, c, cell, dragMode);
                        } else if (e.button === 2) { // 오른쪽 클릭
                            dragMode = cell.classList.contains('marked') ? 'unmark' : 'mark';
                            handleAction(r, c, cell, dragMode);
                        }
                    };

                    // 모바일 터치 시작 지원
                    cell.ontouchstart = (e) => {
                        e.preventDefault();
                        if (isDragging || Date.now() - lastDragEndTime < 50) return;
                        isDragging = true;
                        startR = r;
                        startC = c;
                        dragAxis = null;
                        
                        saveState();
                        
                        if (currentTool === 'fill') {
                            dragMode = cell.classList.contains('filled') ? 'unfill' : 'fill';
                        } else {
                            dragMode = cell.classList.contains('marked') ? 'unmark' : 'mark';
                        }
                        handleAction(r, c, cell, dragMode);
                    };

                    cell.onmouseenter = () => {
                        if (isDragging) {
                            // 축 결정 로직 (처음 움직였을 때)
                            if (!dragAxis) {
                                if (r !== startR) dragAxis = 'col';
                                else if (c !== startC) dragAxis = 'row';
                            }

                            // 결정된 축에 따라서만 동작
                            if (dragAxis === 'row' && r === startR) {
                                handleAction(r, c, cell, dragMode);
                            } else if (dragAxis === 'col' && c === startC) {
                                handleAction(r, c, cell, dragMode);
                            }
                        }
                    };

                    cell.oncontextmenu = (e) => e.preventDefault();
                    
                    grid.appendChild(cell);
                }
            }

            // 모바일 터치 드래그 지원
            grid.ontouchmove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const touch = e.touches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                if (target && target.classList.contains('cell')) {
                    const r = parseInt(target.dataset.r);
                    const c = parseInt(target.dataset.c);
                    if (isNaN(r) || isNaN(c)) return;

                    if (!dragAxis) {
                        if (r !== startR) dragAxis = 'col';
                        else if (c !== startC) dragAxis = 'row';
                    }

                    if (dragAxis === 'row' && r === startR) {
                        handleAction(r, c, target, dragMode);
                    } else if (dragAxis === 'col' && c === startC) {
                        handleAction(r, c, target, dragMode);
                    }
                }
            };

            updateHintStyles();
        }

        // 전역 마우스/터치 업 이벤트 (그리드 밖에서 떼도 멈추게)
        const stopDragging = () => {
            if (isDragging) {
                isDragging = false;
                lastDragEndTime = Date.now();
                dragMode = null;
                dragAxis = null;
                startR = null;
                startC = null;
                
                // 변경된 점이 없으면 불필요한 Undo 스택 상태 제거
                if (undoStack.length > 0 && gridsAreEqual(userGrid, undoStack[undoStack.length - 1])) {
                    undoStack.pop();
                    updateUndoRedoButtons();
                }
                
                saveGameProgress();
            }
        };
        window.onmouseup = stopDragging;
        window.addEventListener('touchend', stopDragging);
        window.addEventListener('touchcancel', stopDragging);

        function handleAction(r, c, el, mode) {
            if (mode === 'fill') {
                if (!el.classList.contains('marked')) {
                    el.classList.add('filled');
                    userGrid[r][c] = 1;
                }
            } else if (mode === 'unfill') {
                el.classList.remove('filled');
                userGrid[r][c] = 0;
            } else if (mode === 'mark') {
                if (!el.classList.contains('filled')) {
                    el.classList.add('marked');
                    userGrid[r][c] = 2;
                }
            } else if (mode === 'unmark') {
                el.classList.remove('marked');
                userGrid[r][c] = 0;
            }
            document.getElementById('message').textContent = "";
            updateHintStyles();
        }

        function getHints(arr) {
            const hints = [];
            let count = 0;
            arr.forEach(val => {
                if (val === 1) count++;
                else if (count > 0) {
                    hints.push(count);
                    count = 0;
                }
            });
            if (count > 0) hints.push(count);
            return hints.length ? hints : [0];
        }

        function checkAnswer() {
            let win = true;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const userFilled = (userGrid[r][c] === 1) ? 1 : 0;
                    if (userFilled !== solution[r][c]) {
                        win = false;
                        break;
                    }
                }
                if (!win) break;
            }
            if (win && !isGameFinished) {
                isGameFinished = true;
                clearCount++;
                localStorage.setItem('nemologic_clear_count', clearCount);
                updateClearCountUI();

                const msg = document.getElementById('message');
                msg.textContent = "🎉 축하합니다! 정답입니다!";
                msg.style.color = "var(--btn-success)";
                showModal();
                saveGameProgress();
            }
        }

        function showModal() {
            const modal = document.getElementById('victoryModal');
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('victoryModal');
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        function startNewGameFromModal() {
            closeModal();
            setTimeout(() => {
                startNewGame();
            }, 300);
        }

        function resetCurrentGame() {
            saveState();
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('filled', 'marked');
            });
            userGrid = Array(size).fill().map(() => Array(size).fill(0));
            document.getElementById('message').textContent = "";
            updateHintStyles();
            saveGameProgress();
        }

        // Undo/Redo 관련 핵심 함수들
        function saveState() {
            undoStack.push(userGrid.map(row => [...row]));
            redoStack = [];
            updateUndoRedoButtons();
            saveGameProgress();
        }

        function undo() {
            if (undoStack.length === 0) return;
            redoStack.push(userGrid.map(row => [...row]));
            const prevState = undoStack.pop();
            applyState(prevState);
        }

        function redo() {
            if (redoStack.length === 0) return;
            undoStack.push(userGrid.map(row => [...row]));
            const nextState = redoStack.pop();
            applyState(nextState);
        }

        function applyState(state) {
            userGrid = state;
            syncGridToUI();
            updateUndoRedoButtons();
            updateHintStyles();
            saveGameProgress();
        }

        // 진행 상황 자동 저장 및 불러오기 함수
        function saveGameProgress() {
            if (isGameFinished) {
                localStorage.removeItem('nemologic_saved_game');
                return;
            }
            try {
                const progress = {
                    size: size,
                    activeGenerationMode: activeGenerationMode,
                    activeModeName: activeModeName,
                    activeModeDesc: activeModeDesc,
                    solution: solution,
                    userGrid: userGrid,
                    isGameFinished: isGameFinished,
                    undoStack: undoStack,
                    redoStack: redoStack
                };
                localStorage.setItem('nemologic_saved_game', JSON.stringify(progress));
            } catch (e) {
                console.error("진행 상황 저장 실패:", e);
            }
        }

        function loadGameProgress() {
            const savedData = localStorage.getItem('nemologic_saved_game');
            if (savedData) {
                try {
                    const progress = JSON.parse(savedData);
                    
                    if (progress && progress.solution && progress.userGrid && progress.size) {
                        size = progress.size;
                        solution = progress.solution;
                        userGrid = progress.userGrid;
                        activeGenerationMode = progress.activeGenerationMode;
                        activeModeName = progress.activeModeName;
                        activeModeDesc = progress.activeModeDesc;
                        isGameFinished = progress.isGameFinished || false;
                        undoStack = progress.undoStack || [];
                        redoStack = progress.redoStack || [];
                        
                        const sizeSelect = document.getElementById('sizeSelect');
                        if (sizeSelect) {
                            sizeSelect.value = size;
                        }
                        
                        initGameUI(true);
                        
                        // 로딩된 그리드 상태 반영
                        for (let r = 0; r < size; r++) {
                            for (let c = 0; c < size; c++) {
                                const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                                if (cell) {
                                    if (userGrid[r][c] === 1) {
                                        cell.classList.add('filled');
                                    } else if (userGrid[r][c] === 2) {
                                        cell.classList.add('marked');
                                    }
                                }
                            }
                        }
                        
                        updateHintStyles();
                        updateUndoRedoButtons();
                        
                        const modeEl = document.getElementById('modeDisplay');
                        modeEl.innerHTML = `⚙️ <strong>${activeModeName}</strong><br><span style="font-size:12px;color:var(--text-muted);">${activeModeDesc}</span>`;
                        if (activeGenerationMode === 0) modeEl.style.color = "var(--text-secondary)";
                        else if (activeGenerationMode === 1) modeEl.style.color = "var(--btn-bg)";
                        else if (activeGenerationMode === 2) modeEl.style.color = "#8b5cf6";
                        else if (activeGenerationMode === 3) modeEl.style.color = "var(--btn-success)";
                        else if (activeGenerationMode === 4) modeEl.style.color = "#d97706";
                        else if (activeGenerationMode === 5) modeEl.style.color = "#db2777";
                        
                        const msg = document.getElementById('message');
                        if (msg) {
                            msg.textContent = "💾 이전 진행 상황을 자동으로 불러왔습니다.";
                            msg.style.color = "var(--text-muted)";
                            setTimeout(() => {
                                if (msg.textContent === "💾 이전 진행 상황을 자동으로 불러왔습니다.") {
                                    msg.textContent = "";
                                }
                            }, 3000);
                        }
                        return true;
                    }
                } catch (e) {
                    console.error("진행 상황 복구 실패:", e);
                    localStorage.removeItem('nemologic_saved_game');
                }
            }
            return false;
        }

        function syncGridToUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                const val = userGrid[r][c];
                
                if (val === 1) {
                    cell.classList.add('filled');
                    cell.classList.remove('marked');
                } else if (val === 2) {
                    cell.classList.remove('filled');
                    cell.classList.add('marked');
                } else {
                    cell.classList.remove('filled', 'marked');
                }
            });
        }

        function updateUndoRedoButtons() {
            const undoBtn = document.getElementById('undoBtn');
            const redoBtn = document.getElementById('redoBtn');
            if (undoBtn) undoBtn.disabled = (undoStack.length === 0);
            if (redoBtn) redoBtn.disabled = (redoStack.length === 0);
        }

        function gridsAreEqual(grid1, grid2) {
            if (!grid1 || !grid2) return false;
            if (grid1.length !== grid2.length) return false;
            for (let r = 0; r < grid1.length; r++) {
                if (grid1[r].length !== grid2[r].length) return false;
                for (let c = 0; c < grid1[r].length; c++) {
                    if (grid1[r][c] !== grid2[r][c]) return false;
                }
            }
            return true;
        }

        // 단축키 이벤트 리스너 등록
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        redo();
                    } else {
                        undo();
                    }
                } else if (e.key.toLowerCase() === 'y') {
                    e.preventDefault();
                    redo();
                }
            }
        });

        function updateHintStyles() {
            let stateChanged;
            do {
                stateChanged = false;

                // Row hints update
                const rowDivs = document.querySelectorAll('.row-hints .hint-row');
                rowDivs.forEach(div => {
                    const r = parseInt(div.dataset.r);
                    if (isNaN(r)) return;
                    
                    const matchedIndices = getMatchedHintIndicesUser(solution[r], userGrid[r]);
                    const totalHintsCount = getHints(solution[r]).length;
                    
                    const spans = div.querySelectorAll('span');
                    spans.forEach(span => {
                        const idx = parseInt(span.dataset.index);
                        if (matchedIndices.has(idx)) {
                            span.classList.add('hint-completed');
                        } else {
                            span.classList.remove('hint-completed');
                        }
                    });

                    // Auto-fill X for completed rows
                    const isRowCompleted = (matchedIndices.size === totalHintsCount);

                    if (isRowCompleted) {
                        for (let c = 0; c < size; c++) {
                            if (userGrid[r][c] === 0) {
                                userGrid[r][c] = 2; // Mark as X
                                const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                                if (cell) {
                                    cell.classList.add('marked');
                                    cell.classList.remove('filled');
                                }
                                stateChanged = true;
                            }
                        }
                    }
                });

                // Col hints update
                const colDivs = document.querySelectorAll('.col-hints .hint-col');
                colDivs.forEach(div => {
                    const c = parseInt(div.dataset.c);
                    if (isNaN(c)) return;
                    
                    const colArr = solution.map(row => row[c]);
                    const userColArr = userGrid.map(row => row[c]);
                    
                    const matchedIndices = getMatchedHintIndicesUser(colArr, userColArr);
                    const totalHintsCount = getHints(colArr).length;
                    
                    const spans = div.querySelectorAll('span');
                    spans.forEach(span => {
                        const idx = parseInt(span.dataset.index);
                        if (matchedIndices.has(idx)) {
                            span.classList.add('hint-completed');
                        } else {
                            span.classList.remove('hint-completed');
                        }
                    });

                    // Auto-fill X for completed cols
                    const isColCompleted = (matchedIndices.size === totalHintsCount);

                    if (isColCompleted) {
                        for (let r = 0; r < size; r++) {
                            if (userGrid[r][c] === 0) {
                                userGrid[r][c] = 2; // Mark as X
                                const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                                if (cell) {
                                    cell.classList.add('marked');
                                    cell.classList.remove('filled');
                                }
                                stateChanged = true;
                            }
                        }
                    }
                });
            } while (stateChanged);
            checkAnswer();
        }

        function getClueBounds(length, hints) {
            const bounds = [];
            const n = hints.length;
            if (n === 0 || (n === 1 && hints[0] === 0)) return [];

            // 1. 최소 시작 위치 (Min Start) 계산
            const minStarts = Array(n).fill(0);
            let currentMin = 0;
            for (let i = 0; i < n; i++) {
                minStarts[i] = currentMin;
                currentMin += hints[i] + 1; // 블록 길이 + 간격 1칸
            }

            // 2. 최대 끝 위치 (Max End) 계산
            const maxEnds = Array(n).fill(0);
            let currentMax = length;
            for (let i = n - 1; i >= 0; i--) {
                maxEnds[i] = currentMax - 1;
                currentMax -= hints[i] + 1; // 블록 길이 + 간격 1칸
            }

            for (let i = 0; i < n; i++) {
                bounds.push({
                    start: minStarts[i],
                    end: maxEnds[i],
                    length: hints[i]
                });
            }
            return bounds;
        }

        function getMatchedHintIndicesUser(solutionLine, userLine) {
            const hints = getHints(solutionLine);
            const userBlocks = [];
            let startIdx = -1;
            
            // 유저가 칠한 검은 칸(1)들의 물리적 위치(시작/끝 인덱스)와 블록 크기를 추출합니다.
            for (let i = 0; i < userLine.length; i++) {
                if (userLine[i] === 1) {
                    if (startIdx === -1) {
                        startIdx = i;
                    }
                } else {
                    if (startIdx !== -1) {
                        userBlocks.push({ start: startIdx, end: i - 1, length: i - startIdx });
                        startIdx = -1;
                    }
                }
            }
            if (startIdx !== -1) {
                userBlocks.push({ start: startIdx, end: userLine.length - 1, length: userLine.length - startIdx });
            }

            const matched = new Set();
            
            // 0 힌트(빈 줄) 예외 처리
            if (hints.length === 1 && hints[0] === 0) {
                if (userBlocks.length === 0) {
                    matched.add(0);
                }
                return matched;
            }

            // 1단계: 각 힌트의 수학적 물리 가용 범위(Bounds) 계산
            const bounds = getClueBounds(userLine.length, hints);

            // 2단계: DP를 이용한 순서 보존 최대 매칭
            const N = bounds.length;
            const M = userBlocks.length;
            
            const dp = Array.from({ length: N + 1 }, () => Array(M + 1).fill(0));
            
            function canMatch(j, i) {
                const b = bounds[j];
                const u = userBlocks[i];
                return u.length === b.length && u.start >= b.start && u.end <= b.end;
            }
            
            for (let j = 1; j <= N; j++) {
                for (let i = 1; i <= M; i++) {
                    let val = Math.max(dp[j-1][i], dp[j][i-1]);
                    if (canMatch(j - 1, i - 1)) {
                        val = Math.max(val, dp[j-1][i-1] + 1);
                    }
                    dp[j][i] = val;
                }
            }
            
            // 3단계: 역추적(Backtracking)하여 매칭된 j(힌트 인덱스) 찾기
            let j = N;
            let i = M;
            while (j > 0 && i > 0) {
                if (canMatch(j - 1, i - 1) && dp[j][i] === dp[j-1][i-1] + 1) {
                    matched.add(j - 1);
                    j--;
                    i--;
                } else if (dp[j][i] === dp[j-1][i]) {
                    j--;
                } else {
                    i--;
                }
            }

            return matched;
        }

        // 테마 설정
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeToggleBtn();
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
            }
            updateThemeToggleBtn();
        }

        function updateThemeToggleBtn() {
            const btn = document.getElementById('themeToggleBtn');
            if (btn) {
                const isDark = document.body.classList.contains('dark-theme');
                btn.innerHTML = isDark ? '☀️ 라이트 모드' : '🌙 다크 모드';
            }
        }

        initTheme();
        updateClearCountUI();
        if (!loadGameProgress()) {
            startNewGame();
        }
    </script>
</body>
