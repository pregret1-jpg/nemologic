<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 네모로직</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        .setup-controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select {
            padding: 8px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .game-container {
            display: inline-grid; /* 컨텐츠에 딱 맞게 */
            grid-template-columns: min-content auto;
            grid-template-rows: min-content auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .empty { 
            grid-column: 1; 
            grid-row: 1; 
        }
        .col-hints {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            border-bottom: 2px solid #333; /* 격자 상단선과 일치 */
        }
        .hint-col {
            width: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            font-size: 11px;
            padding-bottom: 3px;
            border-left: 1px solid #eee;
            box-sizing: border-box;
        }
        .row-hints {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #333; /* 격자 좌측선과 일치 */
        }
        .hint-row {
            height: 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 11px;
            padding-right: 5px;
            border-top: 1px solid #eee;
            box-sizing: border-box;
            white-space: nowrap; /* 숫자가 줄바꿈되지 않게 */
        }
        .grid {
            grid-column: 2;
            grid-row: 2;
            display: grid;
            border-right: 2px solid #333;
            border-bottom: 2px solid #333;
        }
        .cell {
            width: 30px;
            height: 30px;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            background-color: white;
            cursor: pointer;
            box-sizing: border-box;
        }
        /* 첫 줄/첫 열 보더 처리 */
        .cell:nth-child(n) { border-left: none; border-top: none; }
        
        /* 5칸마다 강조선 */
        .v-bold { border-right: 2px solid #666 !important; }
        .h-bold { border-bottom: 2px solid #666 !important; }

        .cell.filled {
            background-color: #333;
        }
        .cell.marked {
            position: relative;
        }
        .cell.marked::after {
            content: "X";
            color: #e74c3c;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, opacity 0.3s;
        }
        button:hover { background-color: #2980b9; }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            opacity: 0.6;
        }
        button.success { background-color: #27ae60; }
        button.success:hover { background-color: #219150; }
        #message {
            margin-top: 15px;
            font-weight: bold;
            height: 24px;
        }

        /* 모달 배경 (Glassmorphism & Fade transition) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            opacity: 1;
        }

        /* 모달 콘텐츠 박스 */
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            max-width: 400px;
            width: 90%;
            transform: scale(0.7);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        /* 닫기 버튼 */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #333;
        }

        /* 빵빠레 이미지 */
        .victory-img {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .modal-content h2 {
            color: #27ae60;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .modal-content p {
            color: #555;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .modal-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: bold;
        }

        .modal-btn:hover {
            background-color: #219150;
            transform: translateY(-2px);
        }

        .modal-btn:active {
            transform: translateY(0);
        }

        .hint-row span, .hint-col span {
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 2px solid transparent;
            border-radius: 50%;
        }
        .hint-row span {
            width: 12px;
            height: 12px;
            font-size: 10.5px;
            margin-left: -1px;
        }
        .hint-col span {
            width: 12px;
            height: 12px;
            font-size: 10.5px;
            margin-top: 2px;
        }
        .hint-completed {
            color: #999 !important;
            opacity: 0.7;
        }
        button.tool-btn {
            font-weight: bold;
        }
        button.tool-btn.fill-mode {
            background-color: #2ecc71; /* Green for check */
        }
        button.tool-btn.fill-mode:hover {
            background-color: #27ae60;
        }
        button.tool-btn.mark-mode {
            background-color: #e74c3c; /* Red for X */
        }
        button.tool-btn.mark-mode:hover {
            background-color: #c0392b;
        }

        /* 모바일 화면 최적화 */
        @media (max-width: 600px) {
            body {
                padding: 10px 5px;
            }
            .game-container {
                padding: 8px;
                border-radius: 8px;
            }
            .setup-controls {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <h1>네모로직</h1>
    
    <div class="setup-controls">
        <label for="sizeSelect" style="font-weight: bold; font-size: 14px; color: #555;">크기:</label>
        <select id="sizeSelect" style="margin-right: 10px;">
            <option value="5">5 x 5</option>
            <option value="10" selected>10 x 10</option>
            <option value="15">15 x 15</option>
        </select>
        <button onclick="startNewGame()">새 게임 만들기</button>
    </div>

    <div class="game-container">
        <div class="empty"></div>
        <div id="colHints" class="col-hints"></div>
        <div id="rowHints" class="row-hints"></div>
        <div id="grid" class="grid"></div>
    </div>
    
    <div class="controls">
        <button id="toolToggleBtn" onclick="toggleTool()" class="tool-btn fill-mode">모드: 체크 ⬛</button>
        <button id="undoBtn" onclick="undo()" disabled>되돌리기</button>
        <button id="redoBtn" onclick="redo()" disabled>다시 실행</button>
        <button onclick="resetCurrentGame()">다시 칠하기</button>
    </div>
    <p id="message"></p>

    <!-- 승리 모달 팝업 -->
    <div id="victoryModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img src="fanfare.png" alt="축하합니다" class="victory-img">
            <h2>🎉 축하합니다! 🎉</h2>
            <p>네모로직 퍼즐을 성공적으로 해결하셨습니다!</p>
            <button class="modal-btn" onclick="startNewGameFromModal()">새 게임 시작하기</button>
        </div>
    </div>

    <script>
        let size = 10;
        let solution = [];
        let userGrid = [];
        let isDragging = false;
        let dragMode = null; // 'fill', 'unfill', 'mark', 'unmark'
        let dragAxis = null; // 'row', 'col'
        let startR = null;
        let startC = null;
        let undoStack = [];
        let redoStack = [];
        let currentTool = 'fill'; // 'fill' or 'mark'

        function toggleTool() {
            const btn = document.getElementById('toolToggleBtn');
            if (currentTool === 'fill') {
                currentTool = 'mark';
                btn.textContent = '모드: X ❌';
                btn.className = 'tool-btn mark-mode';
            } else {
                currentTool = 'fill';
                btn.textContent = '모드: 체크 ⬛';
                btn.className = 'tool-btn fill-mode';
            }
        }

        function startNewGame() {
            size = parseInt(document.getElementById('sizeSelect').value);
            undoStack = [];
            redoStack = [];
            generateRandomSolution();
            initGameUI();
            updateUndoRedoButtons();
            document.getElementById('message').textContent = "";
        }

        function generateRandomSolution() {
            solution = Array(size).fill().map(() => 
                Array(size).fill().map(() => Math.random() > 0.4 ? 1 : 0)
            );
            if (solution.flat().every(v => v === 0)) {
                solution[Math.floor(Math.random()*size)][Math.floor(Math.random()*size)] = 1;
            }
        }

        function initGameUI() {
            userGrid = Array(size).fill().map(() => Array(size).fill(0));
            
            const grid = document.getElementById('grid');
            const rowHints = document.getElementById('rowHints');
            const colHints = document.getElementById('colHints');

            grid.innerHTML = '';
            rowHints.innerHTML = '';
            colHints.innerHTML = '';

            grid.style.gridTemplateColumns = `repeat(${size}, 30px)`;
            grid.style.gridTemplateRows = `repeat(${size}, 30px)`;

            for (let r = 0; r < size; r++) {
                const hints = getHints(solution[r]);
                const div = document.createElement('div');
                div.className = 'hint-row';
                div.dataset.r = r;
                if ((r + 1) % 5 === 0 && (r + 1) !== size) div.classList.add('h-bold');
                hints.forEach((h, index) => {
                    const span = document.createElement('span');
                    span.textContent = h;
                    span.dataset.index = index;
                    div.appendChild(span);
                });
                rowHints.appendChild(div);
            }

            for (let c = 0; c < size; c++) {
                const colArr = solution.map(row => row[c]);
                const hints = getHints(colArr);
                const div = document.createElement('div');
                div.className = 'hint-col';
                div.dataset.c = c;
                if ((c + 1) % 5 === 0 && (c + 1) !== size) div.classList.add('v-bold');
                hints.forEach((h, index) => {
                    const span = document.createElement('span');
                    span.textContent = h;
                    span.dataset.index = index;
                    div.appendChild(span);
                });
                colHints.appendChild(div);
            }

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if ((c + 1) % 5 === 0 && (c + 1) !== size) cell.classList.add('v-bold');
                    if ((r + 1) % 5 === 0 && (r + 1) !== size) cell.classList.add('h-bold');
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    
                    cell.onmousedown = (e) => {
                        if (e.button !== 0 && e.button !== 2) return;
                        e.preventDefault();
                        isDragging = true;
                        startR = r;
                        startC = c;
                        dragAxis = null; // 축 초기화
                        
                        saveState();

                        if (e.button === 0) { // 왼쪽 클릭 / 터치
                            if (currentTool === 'fill') {
                                dragMode = cell.classList.contains('filled') ? 'unfill' : 'fill';
                            } else {
                                dragMode = cell.classList.contains('marked') ? 'unmark' : 'mark';
                            }
                            handleAction(r, c, cell, dragMode);
                        } else if (e.button === 2) { // 오른쪽 클릭
                            dragMode = cell.classList.contains('marked') ? 'unmark' : 'mark';
                            handleAction(r, c, cell, dragMode);
                        }
                    };

                    // 모바일 터치 시작 지원
                    cell.ontouchstart = (e) => {
                        e.preventDefault();
                        isDragging = true;
                        startR = r;
                        startC = c;
                        dragAxis = null;
                        
                        saveState();
                        
                        if (currentTool === 'fill') {
                            dragMode = cell.classList.contains('filled') ? 'unfill' : 'fill';
                        } else {
                            dragMode = cell.classList.contains('marked') ? 'unmark' : 'mark';
                        }
                        handleAction(r, c, cell, dragMode);
                    };

                    cell.onmouseenter = () => {
                        if (isDragging) {
                            // 축 결정 로직 (처음 움직였을 때)
                            if (!dragAxis) {
                                if (r !== startR) dragAxis = 'col';
                                else if (c !== startC) dragAxis = 'row';
                            }

                            // 결정된 축에 따라서만 동작
                            if (dragAxis === 'row' && r === startR) {
                                handleAction(r, c, cell, dragMode);
                            } else if (dragAxis === 'col' && c === startC) {
                                handleAction(r, c, cell, dragMode);
                            }
                        }
                    };

                    cell.oncontextmenu = (e) => e.preventDefault();
                    
                    grid.appendChild(cell);
                }
            }

            // 모바일 터치 드래그 지원
            grid.ontouchmove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const touch = e.touches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                if (target && target.classList.contains('cell')) {
                    const r = parseInt(target.dataset.r);
                    const c = parseInt(target.dataset.c);
                    if (isNaN(r) || isNaN(c)) return;

                    if (!dragAxis) {
                        if (r !== startR) dragAxis = 'col';
                        else if (c !== startC) dragAxis = 'row';
                    }

                    if (dragAxis === 'row' && r === startR) {
                        handleAction(r, c, target, dragMode);
                    } else if (dragAxis === 'col' && c === startC) {
                        handleAction(r, c, target, dragMode);
                    }
                }
            };

            updateHintStyles();
        }

        // 전역 마우스/터치 업 이벤트 (그리드 밖에서 떼도 멈추게)
        const stopDragging = () => {
            if (isDragging) {
                isDragging = false;
                dragMode = null;
                dragAxis = null;
                startR = null;
                startC = null;
                
                // 변경된 점이 없으면 불필요한 Undo 스택 상태 제거
                if (undoStack.length > 0 && gridsAreEqual(userGrid, undoStack[undoStack.length - 1])) {
                    undoStack.pop();
                    updateUndoRedoButtons();
                }
            }
        };
        window.onmouseup = stopDragging;
        window.addEventListener('touchend', stopDragging);
        window.addEventListener('touchcancel', stopDragging);

        function handleAction(r, c, el, mode) {
            if (mode === 'fill') {
                if (!el.classList.contains('marked')) {
                    el.classList.add('filled');
                    userGrid[r][c] = 1;
                }
            } else if (mode === 'unfill') {
                el.classList.remove('filled');
                userGrid[r][c] = 0;
            } else if (mode === 'mark') {
                if (!el.classList.contains('filled')) {
                    el.classList.add('marked');
                    userGrid[r][c] = 2;
                }
            } else if (mode === 'unmark') {
                el.classList.remove('marked');
                userGrid[r][c] = 0;
            }
            document.getElementById('message').textContent = "";
            updateHintStyles();
        }

        function getHints(arr) {
            const hints = [];
            let count = 0;
            arr.forEach(val => {
                if (val === 1) count++;
                else if (count > 0) {
                    hints.push(count);
                    count = 0;
                }
            });
            if (count > 0) hints.push(count);
            return hints.length ? hints : [0];
        }

        function checkAnswer() {
            let win = true;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const userFilled = (userGrid[r][c] === 1) ? 1 : 0;
                    if (userFilled !== solution[r][c]) {
                        win = false;
                        break;
                    }
                }
                if (!win) break;
            }
            if (win) {
                const msg = document.getElementById('message');
                msg.textContent = "🎉 축하합니다! 정답입니다!";
                msg.style.color = "#27ae60";
                showModal();
            }
        }

        function showModal() {
            const modal = document.getElementById('victoryModal');
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('victoryModal');
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        function startNewGameFromModal() {
            closeModal();
            setTimeout(() => {
                startNewGame();
            }, 300);
        }

        function resetCurrentGame() {
            saveState();
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.remove('filled', 'marked');
            });
            userGrid = Array(size).fill().map(() => Array(size).fill(0));
            document.getElementById('message').textContent = "";
            updateHintStyles();
        }

        // Undo/Redo 관련 핵심 함수들
        function saveState() {
            undoStack.push(userGrid.map(row => [...row]));
            redoStack = [];
            updateUndoRedoButtons();
        }

        function undo() {
            if (undoStack.length === 0) return;
            redoStack.push(userGrid.map(row => [...row]));
            const prevState = undoStack.pop();
            applyState(prevState);
        }

        function redo() {
            if (redoStack.length === 0) return;
            undoStack.push(userGrid.map(row => [...row]));
            const nextState = redoStack.pop();
            applyState(nextState);
        }

        function applyState(state) {
            userGrid = state;
            syncGridToUI();
            updateUndoRedoButtons();
            updateHintStyles();
        }

        function syncGridToUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                const val = userGrid[r][c];
                
                if (val === 1) {
                    cell.classList.add('filled');
                    cell.classList.remove('marked');
                } else if (val === 2) {
                    cell.classList.remove('filled');
                    cell.classList.add('marked');
                } else {
                    cell.classList.remove('filled', 'marked');
                }
            });
        }

        function updateUndoRedoButtons() {
            const undoBtn = document.getElementById('undoBtn');
            const redoBtn = document.getElementById('redoBtn');
            if (undoBtn) undoBtn.disabled = (undoStack.length === 0);
            if (redoBtn) redoBtn.disabled = (redoStack.length === 0);
        }

        function gridsAreEqual(grid1, grid2) {
            if (!grid1 || !grid2) return false;
            if (grid1.length !== grid2.length) return false;
            for (let r = 0; r < grid1.length; r++) {
                if (grid1[r].length !== grid2[r].length) return false;
                for (let c = 0; c < grid1[r].length; c++) {
                    if (grid1[r][c] !== grid2[r][c]) return false;
                }
            }
            return true;
        }

        // 단축키 이벤트 리스너 등록
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    if (e.shiftKey) {
                        redo();
                    } else {
                        undo();
                    }
                } else if (e.key.toLowerCase() === 'y') {
                    e.preventDefault();
                    redo();
                }
            }
        });

        function updateHintStyles() {
            let stateChanged;
            do {
                stateChanged = false;

                // Row hints update
                const rowDivs = document.querySelectorAll('.row-hints .hint-row');
                rowDivs.forEach(div => {
                    const r = parseInt(div.dataset.r);
                    if (isNaN(r)) return;
                    
                    const matchedIndices = getMatchedHintIndicesUser(solution[r], userGrid[r]);
                    const totalHintsCount = getHints(solution[r]).length;
                    
                    const spans = div.querySelectorAll('span');
                    spans.forEach(span => {
                        const idx = parseInt(span.dataset.index);
                        if (matchedIndices.has(idx)) {
                            span.classList.add('hint-completed');
                        } else {
                            span.classList.remove('hint-completed');
                        }
                    });

                    // Auto-fill X for completed rows
                    const isRowCompleted = (matchedIndices.size === totalHintsCount);

                    if (isRowCompleted) {
                        for (let c = 0; c < size; c++) {
                            if (userGrid[r][c] === 0) {
                                userGrid[r][c] = 2; // Mark as X
                                const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                                if (cell) {
                                    cell.classList.add('marked');
                                    cell.classList.remove('filled');
                                }
                                stateChanged = true;
                            }
                        }
                    }
                });

                // Col hints update
                const colDivs = document.querySelectorAll('.col-hints .hint-col');
                colDivs.forEach(div => {
                    const c = parseInt(div.dataset.c);
                    if (isNaN(c)) return;
                    
                    const colArr = solution.map(row => row[c]);
                    const userColArr = userGrid.map(row => row[c]);
                    
                    const matchedIndices = getMatchedHintIndicesUser(colArr, userColArr);
                    const totalHintsCount = getHints(colArr).length;
                    
                    const spans = div.querySelectorAll('span');
                    spans.forEach(span => {
                        const idx = parseInt(span.dataset.index);
                        if (matchedIndices.has(idx)) {
                            span.classList.add('hint-completed');
                        } else {
                            span.classList.remove('hint-completed');
                        }
                    });

                    // Auto-fill X for completed cols
                    const isColCompleted = (matchedIndices.size === totalHintsCount);

                    if (isColCompleted) {
                        for (let r = 0; r < size; r++) {
                            if (userGrid[r][c] === 0) {
                                userGrid[r][c] = 2; // Mark as X
                                const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
                                if (cell) {
                                    cell.classList.add('marked');
                                    cell.classList.remove('filled');
                                }
                                stateChanged = true;
                            }
                        }
                    }
                });
            } while (stateChanged);
            checkAnswer();
        }

        function getMatchedHintIndicesUser(solutionLine, userLine) {
            const hints = getHints(solutionLine);
            const userBlocks = [];
            let startIdx = -1;
            
            // 유저가 칠한 검은 칸(1)들의 물리적 위치(시작/끝 인덱스)와 블록 크기를 추출합니다.
            for (let i = 0; i < userLine.length; i++) {
                if (userLine[i] === 1) {
                    if (startIdx === -1) {
                        startIdx = i;
                    }
                } else {
                    if (startIdx !== -1) {
                        userBlocks.push({ start: startIdx, end: i - 1, length: i - startIdx });
                        startIdx = -1;
                    }
                }
            }
            if (startIdx !== -1) {
                userBlocks.push({ start: startIdx, end: userLine.length - 1, length: userLine.length - startIdx });
            }

            const matched = new Set();
            
            // 0 힌트(빈 줄) 예외 처리
            if (hints.length === 1 && hints[0] === 0) {
                if (userBlocks.length === 0) {
                    matched.add(0);
                }
                return matched;
            }

            const m = userBlocks.length;
            const n = hints.length;

            // DP 테이블 생성: dp[i][j]는 U[i..m-1]와 H[j..n-1]의 최대 매칭 수
            const dp = Array(m + 1).fill().map(() => Array(n + 1).fill(0));

            for (let i = m - 1; i >= 0; i--) {
                for (let j = n - 1; j >= 0; j--) {
                    let val = Math.max(dp[i + 1][j], dp[i][j + 1]);
                    if (userBlocks[i].length === hints[j]) {
                        val = Math.max(val, 1 + dp[i + 1][j + 1]);
                    }
                    dp[i][j] = val;
                }
            }

            const maxSize = dp[0][0];
            if (maxSize === 0) {
                return matched;
            }

            // 가장 왼쪽(정방향)으로 당겨서 매칭한 결과 복원 (L)
            const L = Array(m).fill(-1);
            let i = 0, j = 0, remaining = maxSize;
            while (i < m && j < n && remaining > 0) {
                if (userBlocks[i].length === hints[j] && 1 + dp[i + 1][j + 1] === remaining) {
                    L[i] = j;
                    i++;
                    j++;
                    remaining--;
                } else if (dp[i][j + 1] === remaining) {
                    j++;
                } else {
                    i++;
                }
            }

            // 가장 오른쪽(역방향)으로 밀어서 매칭한 결과 복원 (R)
            const R = Array(m).fill(-1);
            i = 0; j = 0; remaining = maxSize;
            while (i < m && j < n && remaining > 0) {
                if (dp[i][j + 1] === remaining) {
                    j++;
                } else if (userBlocks[i].length === hints[j] && 1 + dp[i + 1][j + 1] === remaining) {
                    R[i] = j;
                    i++;
                    j++;
                    remaining--;
                } else {
                    i++;
                }
            }

            // 매칭 정보 조합 및 모호성 해결
            for (let k = 0; k < m; k++) {
                const lIdx = L[k];
                const rIdx = R[k];
                if (lIdx === -1 && rIdx === -1) continue;

                if (lIdx === rIdx) {
                    // 모호함 없이 고유하게 매칭되는 힌트인 경우
                    matched.add(lIdx);
                } else {
                    // 좌/우 매칭이 달라 모호성 발생 시, 격자판 중심과 블록 중심 거리를 비교하여 판단
                    const block = userBlocks[k];
                    const blockCenter = (block.start + block.end) / 2;
                    const boardCenter = userLine.length / 2;

                    if (blockCenter < boardCenter && lIdx !== -1) {
                        matched.add(lIdx);
                    } else if (blockCenter > boardCenter && rIdx !== -1) {
                        matched.add(rIdx);
                    }
                }
            }

            return matched;
        }

        startNewGame();
    </script>
